name = "reverso-cms-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "reverso-db"
database_id = "26c7fa0e-675c-4693-a186-d0d8f8395f5e"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "reverso-media"

# Weekday in CF cron is 1–7 (Mon=1, Sun=7); 0 is invalid.
[triggers]
crons = [ "0 3 * * 7", "0 4 * * *" ]

[vars]
# Em produção (domínio R2 na zona do cliente): https://media.reversofilmes.com.br
# Demo sem DNS na Cloudflare: defina no Dashboard do Worker → Variables:
MEDIA_BASE_URL = "https://reverso-cms-api.reverso-cms.workers.dev/media"
ADMIN_ORIGIN = "https://classy-nougat-5d062d.netlify.app/admin"
SITE_ORIGIN = "https://classy-nougat-5d062d.netlify.app"
ALLOWED_ORIGINS = "https://classy-nougat-5d062d.netlify.app,https://admin.reversofilmes.com.br,https://www.reversofilmes.com.br,https://reversofilmes.com.br"
# CORS: admin servido de localhost (Jekyll) a chamar a API no Worker (credenciais).
DEV_ORIGINS = "http://localhost:4000,http://127.0.0.1:4000"
# Vazio: sessão só no host do Worker (SameSite=None) — necessário para admin em *.netlify.app + API em *.workers.dev.
# Com admin e API no mesmo registrável (ex. admin.* + cms.* em reversofilmes.com.br), defina no dashboard da CF: COOKIE_DOMAIN=.reversofilmes.com.br
COOKIE_DOMAIN = ""
JWT_TTL_SECONDS = "28800"
# false = cookie __session sem Max-Age (sessão do browser); ao fechar o browser perde-se o login. Não força novo pedido de senha no GitHub se já estiver logado lá.
PERSIST_SESSION_COOKIE = "false"
