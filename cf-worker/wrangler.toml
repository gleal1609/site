name = "reverso-cms-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Conta do cliente (Wrangler). Evita deploy na conta errada.
account_id = "823e1343348a9b1e9d44ccdad8c3540d"

[[d1_databases]]
binding = "DB"
database_name = "reverso-db"
database_id = "1fcb3369-0cf6-45e3-85db-8b09aa060d3b"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "reverso-media"

# Weekday in CF cron is 1–7 (Mon=1, Sun=7); 0 is invalid.
[triggers]
crons = [ "0 3 * * 7", "0 4 * * *" ]

[vars]
# Base pública para URLs de ficheiros no R2 (rota /media do Worker). Ajuste após o 1.º deploy se o host workers.dev for diferente.
MEDIA_BASE_URL = "https://reverso-cms-api.reversofilmes.workers.dev/media"
ADMIN_ORIGIN = "https://www.reversofilmes.com.br/admin"
SITE_ORIGIN = "https://www.reversofilmes.com.br"
ALLOWED_ORIGINS = "https://www.reversofilmes.com.br,https://reversofilmes.com.br"
# CORS: admin servido de localhost (Jekyll) a chamar a API no Worker (credenciais).
DEV_ORIGINS = "http://localhost:4000,http://127.0.0.1:4000"
# Vazio: sessão só no host do Worker (SameSite=None) — necessário para admin em *.netlify.app + API em *.workers.dev.
# Com admin e API no mesmo registrável (ex. admin.* + cms.* em reversofilmes.com.br), defina no dashboard da CF: COOKIE_DOMAIN=.reversofilmes.com.br
COOKIE_DOMAIN = ""
JWT_TTL_SECONDS = "28800"
# false = cookie __session sem Max-Age (sessão do browser); ao fechar o browser perde-se o login. Não força novo pedido de senha no GitHub se já estiver logado lá.
PERSIST_SESSION_COOKIE = "false"
# POST ao build hook do Netlify: ?trigger_branch=… (sobrescreve a branch configurada no dashboard do hook).
NETLIFY_DEPLOY_BRANCH = "main"
