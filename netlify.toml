[build]
  command = "node scripts/fetch-projects.mjs && bundle exec jekyll build"
  publish = "_site"

[build.environment]
  RUBY_VERSION = "3.3.0"
  # Mesmo host que site.reverso_cms_api + /api/projects/export. Com custom domain cms.*, alinhar meta + CSP abaixo.
  WORKER_EXPORT_URL = "https://reverso-cms-api.reverso-cms.workers.dev/api/projects/export"

# Alpine.js avalia x-data / @click / etc. com Function() — exige 'unsafe-eval' em script-src (só neste path).
[[headers]]
  for = "/admin/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' cdn.jsdelivr.net https://www.youtube.com https://*.youtube.com https://s.ytimg.com https://*.ytimg.com https://*.google.com https://*.gstatic.com 'unsafe-eval'; style-src 'self' cdn.jsdelivr.net 'unsafe-inline'; connect-src 'self' https://reverso-cms-api.reverso-cms.workers.dev https://cms.reversofilmes.com.br https://www.youtube.com https://*.youtube.com https://*.google.com https://*.googleapis.com https://*.googlevideo.com https://*.gstatic.com https://*.ytimg.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com https://*.google.com; img-src 'self' https://media.reversofilmes.com.br https://reverso-cms-api.reverso-cms.workers.dev https://avatars.githubusercontent.com https://img.youtube.com https://*.ytimg.com https://cdn.pixieset.com https://*.pixieset.com data: blob:; media-src https://media.reversofilmes.com.br https://reverso-cms-api.reverso-cms.workers.dev blob:"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
