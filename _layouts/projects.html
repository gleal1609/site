---
layout: none
---

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} | {{ site.title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Poppins:wght@400;500;900&display=swap" rel="stylesheet" />

  {% include header.html %}
  
  {% include opengraph.html %}

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/bottom-nav.css' | relative_url }}">

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.8/dist/cdn.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="projects-page" x-data="projectsPage('{{ '/projects.json' | relative_url }}')" x-init="init()">
    <!-- Header with navigation -->
    <header class="projects-header">
      <h1 class="projects-title">{{ page.title }}</h1>
      <button 
        class="filter-toggle-btn" 
        @click="showFilters = !showFilters"
        :aria-expanded="showFilters"
        aria-label="Mostrar filtros"
      >
        <i class="fa-solid fa-filter"></i>
        <span>Filtros</span>
        <i class="fa-solid fa-chevron-down filter-chevron" :class="{ 'rotated': showFilters }"></i>
      </button>
    </header>

    <!-- Filters Section -->
    <div class="filters-section" x-show="showFilters" x-transition:enter="filter-enter" x-transition:enter-start="filter-enter-start" x-transition:enter-end="filter-enter-end" x-transition:leave="filter-leave" x-transition:leave-start="filter-leave-start" x-transition:leave-end="filter-leave-end">
      <div class="filters-section-grid">
        <!-- Search Input -->
        <div class="filter-group">
          <label for="search-input" class="filter-label">Buscar</label>
          <input 
            type="text" 
            id="search-input"
            class="filter-input" 
            placeholder="Buscar por título, cliente ou tipo de serviço..."
            x-model="searchTerm"
            @input="updateFilters()"
          />
        </div>

        <!-- Service types: botões em pílula (multi-select, como na Home) -->
        <div class="filter-group filter-group--services">
          <label class="filter-label">Tipos de Serviço</label>
          <p x-show="loading" class="filter-empty">Carregando...</p>
          <div class="projects-filter-service-btns" x-show="!loading && availableServiceTypes.length > 0">
            <template x-for="serviceType in availableServiceTypes" :key="serviceType">
              <button
                type="button"
                class="servico-link projects-filter__btn"
                :class="{ 'projects-filter__btn--active': selectedServiceTypes.includes(serviceType) }"
                @click="toggleServiceType(serviceType)"
                x-text="serviceType"
              ></button>
            </template>
          </div>
          <p x-show="!loading && availableServiceTypes.length === 0" class="filter-empty">Nenhum tipo listado</p>
        </div>

      </div>

      <div class="filters-section-footer">
        <p class="results-count">
          <span x-text="filteredProjects.length"></span>
          <span x-text="filteredProjects.length === 1 ? 'projeto encontrado' : 'projetos encontrados'"></span>
        </p>
        <button
          type="button"
          class="clear-filters-btn clear-filters-btn--footer"
          @click="clearFilters()"
          :disabled="!hasActiveFilters()"
        >
          Limpar Filtros
        </button>
      </div>
    </div>

    <!-- Loading State -->
    <div class="loading-state" x-show="loading">
      <p>Carregando projetos...</p>
    </div>

    <!-- Error State -->
    <div class="error-state" x-show="error" x-cloak>
      <p x-text="error"></p>
    </div>

    <!-- Projects Grid -->
    <div class="projects-grid-simple" x-show="!loading && !error" x-cloak>
      <template x-for="project in filteredProjects" :key="project.url">
        <a :href="project.url" class="project-card-simple" :aria-label="project.title">
          <div class="project-card-thumbnail">
            <img 
              :src="project.thumbnail" 
              :alt="project.title"
              loading="lazy"
            />
          </div>
          <div class="project-card-content">
            <h3 class="project-card-title" x-text="project.title"></h3>
            <p class="project-card-client" x-text="project.client" x-show="project.client"></p>
          </div>
        </a>
      </template>
    </div>

    <!-- Empty State -->
    <div class="empty-state" x-show="!loading && !error && filteredProjects.length === 0" x-cloak>
      <p>Nenhum projeto encontrado com os filtros selecionados.</p>
    </div>
  </div>

  {% include bottom-nav.html %}
  
  <!-- GSAP for bottom nav animations -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" crossorigin="anonymous"></script>
  <script src="{{ '/assets/js/page-transitions.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/projects.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/bottom-nav.js' | relative_url }}"></script>
</body>
</html>
