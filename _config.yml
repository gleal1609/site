title: Reverso Filmes
email: contato@reversofilmes.com.br
description: Reverso Filmes | O Poder de ver o Mundo ao Contrário.
baseurl: "" 
url: "https://temp.reversofilmes.com.br"
twitter_username: reversofilmes
twitter_creator: "@reversofilmes"

# site-wide OG fallbacks
og_image: /assets/og/default-1200x630.png
og_image_width: 1200
og_image_height: 630
og_image_alt: "Reverso Filmes | O Poder de ver o Mundo ao Contrário"
og_locale: pt_BR

# Build settings
theme: minima
plugins:
  - jekyll-feed

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: projects
    values:
      layout: project

# Exclude from processing.
# The following items will not be processed, by default.
# Any item listed under the `exclude:` key here will be automatically added to
# the internal "default list".
#
# Excluded items can be processed by explicitly listing the directories or
# their entries' file path in the `include:` list.
#
# exclude:
#   - .sass-cache/
#   - .jekyll-cache/
#   - gemfiles/
#   - Gemfile
#   - Gemfile.lock
#   - node_modules/
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/
